version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: job-tracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: job-tracker-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
